plugins {
    id 'java'
    id 'application'
}

group = 'com.adrianodiaz'
version = '0.0.1-SNAPSHOT'
description = 'igaming-java-evolution'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(26)
    }
}

repositories {
    mavenCentral()
}

application {
    mainClass = 'com.adrianodiaz.igamingjavaevolution.IgamingJavaEvolutionApplication'
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
